<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <h1 class="logo">NETFLIX</h1>

        <button class="sign-btn">Sign In</button>
    </header>

    <!-- Hero Section -->
    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Unlimited movies, TV shows and more</h1>

            <p>Watch anywhere. Cancel anytime.</p>

            <button class="get-btn">Get Started</button>
        </div>

    </section>

    <!-- Movies Section -->
    <section class="movies">

        <h2>Trending Now</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop" alt="">
            </div>

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1200&auto=format&fit=crop" alt="">
            </div>

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=1200&auto=format&fit=crop" alt="">
            </div>

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1200&auto=format&fit=crop" alt="">
            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>Netflix Clone © 2026</p>
    </footer>

</body>
</html>
